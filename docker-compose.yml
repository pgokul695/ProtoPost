services:
  protopost:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - protopost_data:/data
    environment:
      - CONFIG_PATH=/data/config.json
      - DB_PATH=/data/emails.db
      # Optional: Set an authentication token for API access 
      #- AUTH_TOKEN=your-secret-token
    restart: unless-stopped

volumes:
  protopost_data:
