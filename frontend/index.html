<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProtoPost Dashboard</title>
    <link rel="icon" type="image/jpeg" href="/favicon.jpg">
    
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="/static/js/main.js"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="text-gray-100">
    
    <!-- Header Bar -->
    <header class="bg-slate-800 border-b border-slate-700 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <!-- Logo -->
            <div>
                <h1 class="text-2xl font-bold text-white flex items-center gap-2">
                    <span>📧</span>
                    <span>ProtoPost</span>
                </h1>
                <p class="text-sm text-slate-400 mt-1">Local email routing & testing proxy</p>
            </div>
            
            <!-- Sandbox Toggle -->
            <div class="flex items-center gap-4">
                <label class="flex items-center gap-3 cursor-pointer bg-slate-700 px-5 py-3 rounded-lg border-2 border-slate-600 hover:border-indigo-500 transition-all">
                    <input type="checkbox" id="sandboxToggle" class="w-5 h-5 rounded accent-indigo-500 cursor-pointer">
                    <div>
                        <div class="text-sm font-semibold text-white">Sandbox Mode</div>
                        <div class="text-xs text-slate-400">Intercept all emails locally</div>
                    </div>
                </label>
            </div>
            
            <!-- Connection Status -->
            <div class="flex items-center gap-4">
                <!-- Auth Token Indicator -->
                <div class="flex items-center gap-2">
                    <button id="authBtn" onclick="AuthToken.prompt()" title="Set auth token"
                        class="flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-md border transition-all cursor-pointer">
                        <span id="authIcon">🔓</span>
                        <span id="authLabel" class="text-slate-400">No auth</span>
                    </button>
                </div>
                <div id="connectionDot" class="w-3 h-3 rounded-full bg-gray-500"></div>
                <span class="text-sm text-slate-400">Server: <span id="serverStatus">checking...</span></span>
            </div>
        </div>
    </header>

    <!-- Auth Token Modal -->
    <div id="authModal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
        <!-- Backdrop -->
        <div id="authModalBackdrop" class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="AuthToken.closeModal()"></div>
        <!-- Dialog -->
        <div class="relative bg-slate-800 border border-slate-700 rounded-xl shadow-2xl w-full max-w-md mx-4 p-6">
            <!-- 401 help banner (shown only on 401) -->
            <div id="authModal401Banner" class="hidden mb-4 flex gap-3 items-start bg-amber-900/40 border border-amber-700/60 rounded-lg px-4 py-3 text-sm">
                <span class="text-amber-400 text-base leading-tight mt-0.5">⚠</span>
                <div class="text-amber-200 leading-snug">
                    The server has <strong>AUTH_TOKEN</strong> enabled. Enter the token that was set
                    on the server (env var <code class="bg-slate-700 px-1 rounded text-xs">AUTH_TOKEN</code>).
                    <a href="https://github.com/pgokul695/ProtoPost/blob/main/docs/AUTH.md"
                       target="_blank" rel="noopener"
                       class="block mt-1.5 text-amber-400 underline hover:text-amber-300">
                        How to find / set your token →
                    </a>
                </div>
            </div>
            <!-- Title -->
            <h2 id="authModalTitle" class="text-white font-semibold text-base mb-4">Auth Token</h2>
            <!-- Input -->
            <input id="authModalInput" type="password"
                placeholder="Paste token here…"
                class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 font-mono">
            <p class="text-xs text-slate-500 mt-2">Leave blank to clear a saved token.</p>
            <!-- Buttons -->
            <div class="flex justify-end gap-2 mt-5">
                <button onclick="AuthToken.closeModal()"
                    class="px-4 py-2 text-sm rounded-lg bg-slate-700 hover:bg-slate-600 text-slate-300 transition-colors">
                    Cancel
                </button>
                <button onclick="AuthToken.saveModal()"
                    class="px-4 py-2 text-sm rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white font-medium transition-colors">
                    Save
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 py-8">
        
        <!-- Tab Navigation -->
        <nav class="flex gap-2 mb-6 border-b border-slate-700">
            <button onclick="switchTab('logs')" id="tab-logs" class="tab-button px-6 py-3 font-medium transition-all border-b-2 border-transparent hover:text-indigo-400">
                Outbox & Logs
            </button>
            <button onclick="switchTab('providers')" id="tab-providers" class="tab-button px-6 py-3 font-medium transition-all border-b-2 border-transparent hover:text-indigo-400">
                Providers
            </button>
            <button onclick="switchTab('routing')" id="tab-routing" class="tab-button px-6 py-3 font-medium transition-all border-b-2 border-transparent hover:text-indigo-400">
                Routing
            </button>
            <button onclick="switchTab('test')" id="tab-test" class="tab-button px-6 py-3 font-medium transition-all border-b-2 border-transparent hover:text-indigo-400">
                Test Send
            </button>
        </nav>
        
        <!-- Tab Content -->
        <div id="tabContent">
            <!-- Content will be rendered here -->
        </div>
    </main>
    
    <!-- Toast Container -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 max-w-md"></div>
    
    <!-- Modal Overlay (for log details) -->
    <div id="modalOverlay" class="hidden fixed inset-0 bg-black bg-opacity-75 z-50 flex items-center justify-center p-6" onclick="closeModal()">
        <div class="bg-slate-800 rounded-lg max-w-3xl w-full max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
            <div id="modalContent"></div>
        </div>
    </div>
    
    <!-- Side Panel (for provider forms) -->
    <div id="sidePanel" class="hidden fixed inset-y-0 right-0 w-full md:w-[600px] bg-slate-800 shadow-2xl z-50 overflow-y-auto slide-panel">
        <div id="sidePanelContent"></div>
    </div>
    
</body>
</html>
